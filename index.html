---
layout: default
---

<section class="hero">
    <h1 class="hero-main-title">精神旷野，心灵之海</h1>
    
    <div class="hero-intro">
        <p>思想记录。。。</p>
        <p>文学 游戏 音乐 美术 数学</p>
        <p>等待写作</p>
    </div>
    
    <div class="hero-about">
        <h3>关于我</h3>
        <p>自我介绍先不说了</p>
        <p>正在世之沧海航行，还没有风浪</p>
    </div>
    
    <div class="hero-note">
        <p><em>本站持续建设中，内容会随时间生长。</em></p>
    </div>
    
    <!-- 美术图案占位 -->
    <div class="art-placeholder">
        <div class="art-frame">
            <p>音符 / 美术图案区域</p>
            <p class="art-sub">（待添加 SVG 或手绘元素）</p>
        </div>
    </div>
</section>

<section class="recent-posts">
    <div class="container">
        <h2 class="section-title">最近文章</h2>
        <div class="posts-list">
            {% for post in site.posts limit:5 %}
            <article class="post-item">
                <span class="post-date">{{ post.date | date: "%Y.%m.%d" }}</span>
                <span class="post-category">{{ post.categories | join: ', ' }}</span>
                <a href="{{ post.url | relative_url }}" class="post-link">{{ post.title }}</a>
            </article>
            {% endfor %}
        </div>
        <a href="{{ '/blog/' | relative_url }}" class="view-all">查看全部文章 →</a>
    </div>
</section>
