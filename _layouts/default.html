<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="top-header">
        <div class="container">
            <div class="header-inner">
                <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
                <nav class="main-nav">
                    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a>
                    <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog/' %}class="active"{% endif %}>文章列表</a>
                    <a href="{{ '/gallery/' | relative_url }}" {% if page.url contains '/gallery/' %}class="active"{% endif %}>文艺馆</a>
                    <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="active"{% endif %}>关于</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        {{ content }}
    </main>

    <!-- 底部 -->
    <footer class="bottom-footer">
        <div class="container">
            <p>by ever-luv</p>
        </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
